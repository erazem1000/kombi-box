<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 490 320">
  <!-- Beige background -->
  <rect width="490" height="320" fill="#f7f3ed"/>

  <!-- Left vertical line (front of van) -->
  <line x1="82" y1="268" x2="82" y2="68"
        stroke="#2b2018" stroke-width="9"
        stroke-linecap="round"/>

  <!-- Van body — D-shape arc -->
  <path d="M 84 70 C 86 18, 456 18, 456 200 C 456 232 450 260 442 268"
        fill="none"
        stroke="#2b2018"
        stroke-width="9"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- "My Way" text -->
  <text x="268" y="190"
        font-family="Georgia, 'Times New Roman', serif"
        font-style="italic"
        font-size="42"
        fill="#2b2018"
        text-anchor="middle">My Way</text>

  <!-- Left wheel -->
  <circle cx="122" cy="258" r="44"
          fill="none" stroke="#2b2018" stroke-width="9"/>

  <!-- Middle wheel -->
  <circle cx="242" cy="256" r="44"
          fill="none" stroke="#2b2018" stroke-width="9"/>

  <!-- Small eye/dot -->
  <ellipse cx="318" cy="261" rx="13" ry="9"
           fill="#2b2018"/>

  <!-- Right wheel -->
  <circle cx="406" cy="255" r="50"
          fill="none" stroke="#2b2018" stroke-width="9"/>
</svg>
