{% assign lang = page.lang | default: 'sl' %}
{% assign t = site.data[lang] %}

<header class="site-header" role="banner">
  <div class="container">
    <a href="{% if lang == 'en' %}/en/{% elsif lang == 'de' %}/de/{% else %}/{% endif %}" class="site-logo" aria-label="Kombi Box - domov">
      <img src="/assets/images/favicon.png" alt="" class="logo-icon" width="32" height="32">
      <span class="logo-text">Kombi<strong>Box</strong></span>
    </a>

    <button class="menu-toggle" id="menu-toggle" aria-label="Odpri meni" aria-expanded="false">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <nav id="nav-menu" role="navigation" aria-label="Glavna navigacija">
      <ul>
        <li><a href="#features">{{ t.nav.features }}</a></li>
        <li><a href="#gallery">{{ t.nav.gallery }}</a></li>
        <li><a href="#contact">{{ t.nav.contact }}</a></li>
        <li class="lang-dropdown">
          <button class="lang-toggle" aria-expanded="false" aria-haspopup="true">
            🌐 <span>{{ lang | upcase }}</span>
          </button>
          <ul class="lang-menu" role="menu">
            <li role="none"><a href="/" hreflang="sl" role="menuitem"{% if lang == 'sl' %} class="active"{% endif %}>Slovensko</a></li>
            <li role="none"><a href="/en/" hreflang="en" role="menuitem"{% if lang == 'en' %} class="active"{% endif %}>English</a></li>
            <li role="none"><a href="/de/" hreflang="de" role="menuitem"{% if lang == 'de' %} class="active"{% endif %}>Deutsch</a></li>
          </ul>
        </li>
      </ul>
    </nav>
  </div>
</header>
