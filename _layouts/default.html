<!DOCTYPE html>
<html lang="{{ page.lang | default: 'sl' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">

  {% assign t = site.data[page.lang | default: 'sl'] %}

  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{% if page.lang == 'en' %}{{ site.description_en }}{% elsif page.lang == 'de' %}{{ site.description_de }}{% else %}{{ site.description }}{% endif %}">

  <!-- Open Graph -->
  <meta property="og:title" content="{{ page.title | default: site.title }}">
  <meta property="og:description" content="{% if page.lang == 'en' %}{{ site.description_en }}{% elsif page.lang == 'de' %}{{ site.description_de }}{% else %}{{ site.description }}{% endif %}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta property="og:image" content="{{ '/assets/images/og-image.jpg' | absolute_url }}">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/assets/images/favicon.svg?v=2">
  <link rel="icon" type="image/png" href="/assets/images/favicon.png?v=2">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="/assets/css/main.css">

  {% seo %}
</head>
<body>

  {% include header.html %}

  <main>
    {{ content }}
  </main>

  {% include footer.html %}

  <!-- Smooth scroll & nav active state -->
  <script>
    // Smooth scroll for anchor links
    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
      anchor.addEventListener('click', function(e) {
        e.preventDefault();
        const target = document.querySelector(this.getAttribute('href'));
        if (target) {
          target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
      });
    });

    // Mobile nav toggle
    const menuToggle = document.getElementById('menu-toggle');
    const navMenu = document.getElementById('nav-menu');
    if (menuToggle && navMenu) {
      menuToggle.addEventListener('click', () => {
        navMenu.classList.toggle('open');
        menuToggle.classList.toggle('active');
      });
    }

    // Language dropdown
    const langToggle = document.querySelector('.lang-toggle');
    const langDropdown = document.querySelector('.lang-dropdown');
    if (langToggle && langDropdown) {
      langToggle.addEventListener('click', (e) => {
        e.stopPropagation();
        const isOpen = langDropdown.classList.toggle('open');
        langToggle.setAttribute('aria-expanded', String(isOpen));
      });
      document.addEventListener('click', () => {
        langDropdown.classList.remove('open');
        langToggle.setAttribute('aria-expanded', 'false');
      });
    }

    // Sticky header shadow
    window.addEventListener('scroll', () => {
      const header = document.querySelector('.site-header');
      if (header) {
        header.classList.toggle('scrolled', window.scrollY > 20);
      }
    });

    // Contact form submission (Formspree)
    const form = document.getElementById('contact-form');
    if (form) {
      form.addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = form.querySelector('[type="submit"]');
        const successMsg = document.getElementById('form-success');
        btn.disabled = true;
        btn.textContent = '...';
        try {
          const resp = await fetch(form.action, {
            method: 'POST',
            body: new FormData(form),
            headers: { 'Accept': 'application/json' }
          });
          if (resp.ok) {
            form.style.display = 'none';
            if (successMsg) successMsg.style.display = 'block';
          } else {
            btn.disabled = false;
            btn.textContent = btn.getAttribute('data-label');
          }
        } catch(err) {
          btn.disabled = false;
          btn.textContent = btn.getAttribute('data-label');
        }
      });
    }
  </script>

</body>
</html>
